<style>
  :root {
    --primary: #4F94EF;
    --primary-light: #E8F1FD;
    --primary-dark: #2563EB;
    --accent: #10B981;
    --accent-light: #D1FAE5;
    --text-primary: #1F2937;
    --text-secondary: #6B7280;
    --text-muted: #9CA3AF;
    --bg-primary: #FFFFFF;
    --bg-secondary: #F9FAFB;
    --bg-tertiary: #F3F4F6;
    --border: #E5E7EB;
    --border-light: #F3F4F6;
    --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
    --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.07), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
    --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.08), 0 4px 6px -4px rgba(0, 0, 0, 0.04);
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --radius-xl: 20px;
    --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
    color: var(--text-primary);
    background: var(--bg-secondary);
  }

  #app { min-height: 100vh; display: flex; flex-direction: column; }

  /* Header */
  #header {
    background: rgba(255, 255, 255, 0.92);
    backdrop-filter: blur(16px) saturate(180%);
    -webkit-backdrop-filter: blur(16px) saturate(180%);
    border-bottom: 1px solid var(--border-light);
    position: fixed;
    top: 0; left: 0; width: 100%;
    z-index: 1000;
  }

  #header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--primary), #818CF8, var(--accent), var(--primary));
    background-size: 300% 100%;
    animation: header-gradient 8s ease infinite;
  }

  @keyframes header-gradient {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  .header-inner {
    display: flex;
    padding: 0 48px;
    align-items: center;
    height: 72px;
  }

  .header-left .logo {
    font-size: 21px;
    font-weight: 700;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, var(--primary), #7C3AED);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    cursor: pointer;
    margin-right: 40px;
    text-decoration: none;
  }

  .header-nav {
    flex: 1;
    display: flex;
    gap: 4px;
  }

  .header-nav a {
    padding: 10px 20px;
    color: var(--text-secondary);
    font-size: 15px;
    font-weight: 500;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: var(--transition);
    text-decoration: none;
  }

  .header-nav a:hover,
  .header-nav a.router-link-active {
    color: var(--primary);
    background: var(--primary-light);
  }

  /* Main Content */
  #main-content {
    flex: 1;
    padding-top: 76px;
    min-height: calc(100vh - 200px);
  }

  /* Footer */
  #tabbar {
    background: linear-gradient(180deg, #1E293B, #0F172A) !important;
    padding: 40px 0 32px;
    text-align: center;
    position: relative;
  }

  #tabbar::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(79, 148, 239, 0.3), transparent);
  }

  #tabbar .company {
    font-size: 13px;
    color: rgba(255, 255, 255, 0.5);
    letter-spacing: 0.05em;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
  ::selection { background: var(--primary-light); color: var(--primary-dark); }

  /* Banner / Swiper */
  .banner { overflow: hidden; margin-top: 16px; }
  .banner .swiper-container { width: 100%; height: 320px !important; }
  .swiper-container { width: 100%; height: 320px; }
  .swiper-slide img { width: 100%; height: 100%; object-fit: cover; }

  /* Search Section */
  .search-section {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    padding: 28px 24px;
    background: #fff;
  }
  .search-section input {
    width: 380px;
    height: 44px;
    padding: 0 16px;
    font-size: 15px;
    border: 1px solid var(--border);
    border-radius: 8px;
    outline: none;
    transition: var(--transition);
  }
  .search-section input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(79, 148, 239, 0.12);
  }

  /* Product Grid */
  .product-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
  }
  .product-card {
    background: #fff;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--border-light);
    transition: var(--transition);
    cursor: pointer;
  }
  .product-card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow-lg);
  }
  .card-img-wrap {
    width: 100%;
    aspect-ratio: 1 / 1;
    overflow: hidden;
    background: #f5f5f5;
  }
  .card-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.4s ease;
  }
  .product-card:hover .card-img-wrap img {
    transform: scale(1.05);
  }
  .card-body {
    padding: 14px 16px;
  }
  .card-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
    margin-bottom: 8px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .card-price {
    font-size: 18px;
    font-weight: 700;
    color: #ef4444;
  }
  .card-price .currency {
    font-size: 13px;
    margin-right: 2px;
  }

  /* News Grid */
  .news-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
  }
  .news-card {
    display: flex;
    background: #fff;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--border-light);
    cursor: pointer;
    transition: var(--transition);
  }
  .news-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
  }
  .news-img {
    width: 180px;
    height: 140px;
    flex-shrink: 0;
    overflow: hidden;
  }
  .news-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .news-body {
    flex: 1;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .news-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 8px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .news-desc {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.6;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .news-footer .news-time {
    font-size: 12px;
    color: var(--text-muted);
  }

  /* Header Right - User */
  .header-right {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-left: auto;
    padding-left: 20px;
  }
  .header-user {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    padding: 6px 12px;
    border-radius: 8px;
    transition: var(--transition);
  }
  .header-user:hover {
    background: var(--primary-light);
  }
  .header-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--border);
  }
  .header-username {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
  }
  .header-logout {
    font-size: 13px;
    color: #e74c3c;
    cursor: pointer;
    padding: 6px 12px;
    border-radius: 6px;
    transition: var(--transition);
    text-decoration: none;
  }
  .header-logout:hover {
    background: #fef2f2;
  }
  .header-login-btn {
    font-size: 14px;
    font-weight: 500;
    color: var(--primary);
    cursor: pointer;
    padding: 6px 16px;
    border-radius: 8px;
    transition: var(--transition);
    text-decoration: none;
    border: 1px solid var(--primary);
  }
  .header-login-btn:hover {
    background: var(--primary);
    color: #fff;
  }

  /* Cart Table */
  .cart-table .el-table__cell { vertical-align: middle !important; }
  .cart-product {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .cart-img {
    width: 64px;
    height: 64px;
    object-fit: cover;
    border-radius: 6px;
    flex-shrink: 0;
  }
  .cart-name {
    flex: 1;
    min-width: 0;
    font-size: 14px;
    color: #333;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* Vue 3 过渡动画 */
  .fade-enter-active, .fade-leave-active { transition: opacity 0.3s ease; }
  .fade-enter-from, .fade-leave-to { opacity: 0; }
</style>
