	<style>

		button, button:focus {

		.data-add-container .add .layui-select-title .layui-unselect {

		.data-add-container .add .layui-form-item {

	<body style="background: #EEEEEE; ">


		<div id="app">

			<!--
			<div class="layui-carousel" id="swiper">
				<div carousel-item id="swiper-item">
					<div v-for="(item,index) in swiperList" v-bind:key="index">

			<div class="layui-carousel" id="swiper" :style='{"boxShadow":"0 0px 0px #fff143","margin":"0 ","borderColor":"rgba(0,0,0,.3)","borderRadius":"0px","borderWidth":"0","width":"100%","borderStyle":"solid"}'>

				</div>
			  </div>
			</div>
			<!-- иҪ®ж’ӯеӣҫ -->

			<div class="data-add-container" :style='{"padding":"20px","boxShadow":"0px 0px 0px rgba(255,0,0,.8)","margin":"50px auto","borderColor":"rgba(255, 0, 0, 0)","backgroundColor":"#fff","borderRadius":"10px","borderWidth":"0","borderStyle":"solid"}'>

				<form class="layui-form layui-form-pane add" lay-filter="myForm">
					
                                                            <div  :style='{"padding":"10px","boxShadow":"0 0 0px #1685a9","margin":"0 0 10px 0","borderColor":"rgba(22, 133, 169, 1)","backgroundColor":"#fff","borderRadius":"0px","borderWidth":"0 0 1px 0","borderStyle":"solid"}' class="layui-form-item" pane>
						<label  :style='{"width":"110px","padding":"0 12px 0 0","fontSize":"16px","color":"rgba(107, 104, 130, 1)","textAlign":"left"}' class="layui-form-label">еҗҚз§°пјҡ</label>
						<div class="layui-input-block">
							<input :style='{"padding":"0 12px","boxShadow":"0 0 0px rgba(255,0,0,.8)","borderColor":"rgba(107, 104, 130, 1)","backgroundColor":"#fff","color":"#333","borderRadius":"4px","textAlign":"left","borderWidth":"1px","fontSize":"16px","borderStyle":"solid","height":"50px"}' v-model="detail.name" type="text" :readonly="ro.name" name="name" id="name" autocomplete="off" class="layui-input">
						</div>
					</div>
                                                                                <div :style='{"padding":"10px","boxShadow":"0 0 0px #1685a9","margin":"0 0 10px 0","borderColor":"rgba(22, 133, 169, 1)","backgroundColor":"#fff","borderRadius":"0px","borderWidth":"0 0 1px 0","borderStyle":"solid"}' class="layui-form-item" pane>
						<label :style='{"width":"110px","padding":"0 12px 0 0","fontSize":"16px","color":"rgba(107, 104, 130, 1)","textAlign":"left"}' class="layui-form-label">еҖјпјҡ</label>
						<div class="layui-input-block">
							<div v-if="detail.value" style="display:inline-block;margin-right:10px;">
								<img id="valueImg" style="width: 100px;height: 100px;border-radius: 50%;border: 2px solid #EEEEEE;" :src="detail.value">
								<input type="hidden" :value="detail.value" id="value" name="value" />
							</div>
							<button v-if="!ro.value" :style='{"padding":"0 10px","boxShadow":"3px 3px 0px  #e0eee8","margin":"0 10px 0 0","borderColor":"#ccc","backgroundColor":"rgba(164, 226, 198, 1)","color":"rgba(157, 41, 51, 1)","borderRadius":"6px","borderWidth":"0","width":"auto","fontSize":"14px","borderStyle":"solid","height":"44px"}' type="button" class="layui-btn btn-theme" id="valueUpload">
								<i v-if="true" :style='{"color":"rgba(157, 41, 51, 1)","show":true,"fontSize":"14px"}' class="layui-icon">&#xe67c;</i>дёҠдј еҖј
							</button>
						</div>
					</div>
                                                            
                                                                                                    
					<div  :style='{"padding":"10px","boxShadow":"0 0 0px #1685a9","margin":"0 0 10px 0","borderColor":"rgba(22, 133, 169, 1)","backgroundColor":"#fff","borderRadius":"0px","borderWidth":"0 0 1px 0","borderStyle":"solid"}' class="layui-form-item">
						<div class="layui-input-block" style="text-align: right;">
							<button :style='{"padding":"0 10px","boxShadow":"8px 6px 6px #a1afc9","margin":"0 10px","borderColor":"#ccc","backgroundColor":"rgba(23, 124, 176, 1)","color":"#fff","borderRadius":"6px","borderWidth":"0","width":"25%","fontSize":"16px","borderStyle":"solid","height":"50px"}' class="layui-btn btn-submit" lay-submit lay-filter="*">жҸҗдәӨ</button>
							<button :style='{"padding":"0 10px","boxShadow":"6px 5px 6px #c2ccd0","margin":"0 10px","borderColor":"#ccc","backgroundColor":"rgba(214, 236, 240, 1)","color":"rgba(219, 90, 107, 1)","borderRadius":"6px","borderWidth":"0","width":"25%","fontSize":"16px","borderStyle":"solid","height":"50px"}' type="reset" class="layui-btn layui-btn-primary">йҮҚзҪ®</button>
						</div>
					</div>
				</form>
			</div>
		</div>

		<script src="../../layui/layui.js"></script>
		<script src="../../js/vue.js"></script>
		<!-- з»„д»¶й…ҚзҪ®дҝЎжҒҜ -->
		<script src="../../js/config.js"></script>
		<!-- жү©еұ•жҸ’д»¶й…ҚзҪ®дҝЎжҒҜ -->
		<script src="../../modules/config.js"></script>
		<!-- е·Ҙе…·ж–№жі• -->
		<script src="../../js/utils.js"></script>
		<!-- ж ЎйӘҢж јејҸе·Ҙе…·зұ» -->
		<script src="../../js/validate.js"></script>
		<!-- ең°еӣҫ -->
		<script type="text/javascript" src="../../js/jquery.js"></script>
		<script type="text/javascript" src="http://webapi.amap.com/maps?v=1.3&key=ca04cee7ac952691aa67a131e6f0cee0"></script>
		<script type="text/javascript" src="../../js/bootstrap.min.js"></script>
		<script type="text/javascript" src="../../js/bootstrap.AMapPositionPicker.js"></script>

		<script>
			var jquery = $;
			
			var vue = new Vue({
				el: '#app',
				data: {
					// иҪ®ж’ӯеӣҫ
					swiperList: [{
						img: '../../img/banner.jpg'
					}],
					dataList: [],
      					ro:{
				        name : false,
				        value : false,
              				},
                    detail: {
                                                                        name: '',
                                                                                                value: '',
                                                                    },
                    																									centerMenu: centerMenu
				},
				updated: function() {
					layui.form.render('select', 'myForm');
				},
                computed: {
                                                                                                                                                            },
				methods: {
					jump(url) {
						jump(url)
					}
				}
			})

			
			layui.use(['layer', 'element', 'carousel', 'http', 'jquery', 'form', 'upload', 'laydate','tinymce'], function() {
				var layer = layui.layer;
				var element = layui.element;
				var carousel = layui.carousel;
				var http = layui.http;
				var jquery = layui.jquery;
				var form = layui.form;
				var upload = layui.upload;
				var laydate = layui.laydate;
                var tinymce = layui.tinymce

				// иҺ·еҸ–иҪ®ж’ӯеӣҫ ж•°жҚ®
				http.request('config/list', 'get', {
					page: 1,
					limit: 5
				}, function(res) {
					if (res.data.list.length > 0) {
						var swiperItemHtml = '';
						for (let item of res.data.list) {
							if (item.name.indexOf('picture') >= 0 && item.value && item.value != "" && item.value != null) {
								swiperItemHtml +=
									'<div>' +
									'<img style="width: 100%;height: 100%;object-fit:cover;" class="swiper-item" src="' + item.value + '">' +
									'</div>';
							}
						}
						jquery('#swiper-item').html(swiperItemHtml);
						// иҪ®ж’ӯеӣҫ
						vue.$nextTick(() => {
						  carousel.render({
						  	elem: '#swiper',
							width: '100%',
						  	height: '600px',
						  	arrow: 'hover',
						  	anim: 'default',
						  	autoplay: 'true',
						  	interval: '3000',
						  	indicator: 'inside'
						  });
						
						})
						// carousel.render({
						// 	elem: '#swiper',
						// 	width: swiper.width,height:swiper.height,
						// 	arrow: swiper.arrow,
						// 	anim: swiper.anim,
						// 	interval: swiper.interval,
						// 	indicator: "none"
						// });
					}
				});

                																// дёҠдј еӣҫзүҮ
				var valueUpload = upload.render({
					//з»‘е®ҡе…ғзҙ 
					elem: '#valueUpload',
					//дёҠдј жҺҘеҸЈ
					url: http.baseurl + 'file/upload',
					// иҜ·жұӮеӨҙ
					headers: {
						Token: localStorage.getItem('Token')
					},
					// е…Ғи®ёдёҠдј ж—¶ж ЎйӘҢзҡ„ж–Үд»¶зұ»еһӢ
					accept: 'images',
					before: function() {
						//loadingеұӮ
						var index = layer.load(1, {
							shade: [0.1, '#fff'] //0.1йҖҸжҳҺеәҰзҡ„зҷҪиүІиғҢжҷҜ
						});
					},
					// дёҠдј жҲҗеҠҹ
					done: function(res) {
						console.log(res);
						layer.closeAll();
						if (res.code == 0) {
							layer.msg("дёҠдј жҲҗеҠҹ", {
								time: 2000,
								icon: 6
							})
							var url = res.file;
							jquery('#value').val(url);
							jquery('#valueImg').attr('src', url)
                            vue.detail.value = url;
						} else {
							layer.msg(res.msg, {
								time: 2000,
								icon: 5
							})
						}
					},
					//иҜ·жұӮејӮеёёеӣһи°ғ
					error: function() {
						layer.closeAll();
						layer.msg("иҜ·жұӮжҺҘеҸЈејӮеёё", {
							time: 2000,
							icon: 5
						})
					}
				});
												

                // и·ЁиЎЁ
                if(http.getParam('corss')){
					var obj = JSON.parse(localStorage.getItem('crossObj'));
					for (var o in obj){
					if(o=='name'){
          	                                vue.detail[o] = obj[o];
						vue.ro.name = true;
						continue;
                                        }
					if(o=='value'){
          	                                vue.detail[o] = obj[o];
						vue.ro.value = true;
						continue;
                                        }
                                        }
				}
				

				// жҸҗдәӨ
				form.on('submit(*)', function(data) {
					data = data.field;
					
                    // ж•°жҚ®ж ЎйӘҢ
                    if(!data.name){
                        layer.msg('еҗҚз§°дёҚиғҪдёәз©ә', {
							time: 2000,
							icon: 5
						});
                        return false
                    }
                                                                                                                                                                                                                                                                                                            
					// и·ЁиЎЁи®Ўз®—
					                                                                                					
                    // жҜ”иҫғеӨ§е°Ҹ
                                                                                                                                                                                                                                                                    					
					// жҸҗдәӨж•°жҚ®
					http.requestJson('config' + '/add', 'post', data, function(res) {
					 	layer.msg('жҸҗдәӨжҲҗеҠҹ', {
					 		time: 2000,
					 		icon: 6
					 	}, function() {
					 		back();
						});
					 });

					return false
				});

			});
		</script>
	</body>
